# Local full-stack run with Docker (backend, frontend, MySQL).
# Usage:
#   1. Create Backend/.env on this machine (see Backend/.env.example).
#   2. docker compose --env-file Backend/.env up --build -d
#
# Production: open http://YOUR_SERVER_IP (port 80).
# API calls go to /api on the same host via nginx — no localhost CORS issues.

services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./Backend
    container_name: chat-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      MYSQL_HOST: mysql
      PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./Frontend
    container_name: chat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
